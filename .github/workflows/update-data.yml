name: Update Pilot Data

# Runs weekly on Sundays at 6:00 AM UTC
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      force_sectional:
        description: 'Force sectional chart update'
        required: false
        type: boolean
        default: false
  push:
    paths:
      - '.trigger-faa-update'  # Touch this file to trigger FAA data update

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal unzip curl

      - name: Download FAA Airmen Database
        id: download
        run: |
          echo "Downloading FAA Airmen Database..."
          
          # FAA servers can be slow - use aggressive retry settings
          MAX_ATTEMPTS=5
          ATTEMPT=1
          SUCCESS=false
          
          while [[ $ATTEMPT -le $MAX_ATTEMPTS ]]; do
            echo "Download attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            if curl -L -o airmen.zip \
              --connect-timeout 120 \
              --max-time 900 \
              --retry 2 \
              --retry-delay 30 \
              --retry-all-errors \
              -H "User-Agent: Mozilla/5.0 (compatible; WA-Pilots-Map/1.0)" \
              "https://registry.faa.gov/database/ReleasableAirmen.zip"; then
              
              # Verify we got a valid zip file
              if unzip -t airmen.zip > /dev/null 2>&1; then
                echo "Download successful and zip file valid"
                SUCCESS=true
                break
              else
                echo "Downloaded file is not a valid zip, retrying..."
                rm -f airmen.zip
              fi
            else
              echo "curl failed with exit code $?"
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            if [[ $ATTEMPT -le $MAX_ATTEMPTS ]]; then
              echo "Waiting 60 seconds before retry..."
              sleep 60
            fi
          done
          
          if [[ "$SUCCESS" != "true" ]]; then
            echo "::error::Failed to download FAA Airmen Database after $MAX_ATTEMPTS attempts"
            echo "download_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "Extracting PILOT_BASIC.csv..."
          unzip -o -j airmen.zip PILOT_BASIC.csv -d .
          
          echo "File info:"
          ls -lh PILOT_BASIC.csv
          echo "Record count: $(wc -l < PILOT_BASIC.csv)"
          echo "download_failed=false" >> $GITHUB_OUTPUT

      - name: Process pilot data
        run: |
          python3 scripts/process_pilots.py

      - name: Check for sectional chart updates
        if: ${{ github.event.inputs.force_sectional == 'true' || github.event_name == 'schedule' }}
        run: |
          echo "Checking VFR sectional chart..."
          # Check if current chart is expired
          if [[ -f "data/sectional_metadata.json" ]]; then
            EXPIRY=$(python3 -c "import json; print(json.load(open('data/sectional_metadata.json')).get('expires', ''))")
            TODAY=$(date +%Y-%m-%d)
            if [[ "$EXPIRY" < "$TODAY" ]] || [[ "${{ github.event.inputs.force_sectional }}" == "true" ]]; then
              echo "Chart expired or force update requested, downloading new chart..."
              ./scripts/update_sectional.sh
            else
              echo "Chart still valid until $EXPIRY"
            fi
          else
            echo "No metadata found, downloading chart..."
            ./scripts/update_sectional.sh
          fi

      - name: Update timestamp in index.html
        run: |
          CURRENT_MONTH=$(date '+%B %Y')
          sed -i "s/(.*[0-9]\{4\})/(${CURRENT_MONTH})/g" index.html || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check for changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Get pilot count for commit message
          PILOT_COUNT=$(python3 -c "import json; print(json.load(open('data/wa_pilots.json'))['summary']['total_pilots'])" 2>/dev/null || echo "unknown")
          
          git add -A
          git commit -m "Update pilot data - $(date '+%Y-%m-%d')
          
          Automated update from FAA Airmen Registry.
          Total pilots: $PILOT_COUNT"
          
          git push

      - name: Trigger pages deployment
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches" \
            -d '{"ref":"main"}' || echo "Could not trigger pages deployment"

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: update-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 30
          if-no-files-found: ignore
