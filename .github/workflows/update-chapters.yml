name: Update WPA Chapters

# Manual trigger only - chapter data changes infrequently
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'URL to chapters JSON (optional, uses default if empty)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-chapters:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update chapter data
        run: |
          echo "WPA Chapter data is maintained manually."
          echo "To update, edit data/wpa_chapters.json directly."
          echo ""
          echo "Current chapters:"
          python3 -c "import json; d=json.load(open('data/wpa_chapters.json')); print(f'{len(d[\"features\"])} chapters')"
          
          # Validate GeoJSON structure
          python3 << 'EOF'
          import json
          import sys
          
          with open('data/wpa_chapters.json') as f:
              data = json.load(f)
          
          if data.get('type') != 'FeatureCollection':
              print("ERROR: Not a valid GeoJSON FeatureCollection")
              sys.exit(1)
          
          for i, feature in enumerate(data['features']):
              props = feature.get('properties', {})
              required = ['name', 'airport', 'meeting', 'contact']
              missing = [r for r in required if r not in props]
              if missing:
                  print(f"WARNING: Feature {i} ({props.get('name', 'unknown')}) missing: {missing}")
          
          print("Chapter data validation passed!")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add data/wpa_chapters.json
          git commit -m "Update WPA chapter data"
          git push
