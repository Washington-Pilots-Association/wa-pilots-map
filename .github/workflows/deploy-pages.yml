name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sectional tiles from release
        run: |
          echo "Downloading sectional tiles..."
          # Get the latest release with tiles
          RELEASE_URL=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | \
            grep -o 'https://[^"]*sectional-tiles.tar.gz' | head -1) || true
          
          if [[ -n "$RELEASE_URL" ]]; then
            echo "Downloading from: $RELEASE_URL"
            curl -L -o sectional-tiles.tar.gz "$RELEASE_URL"
            tar -xzf sectional-tiles.tar.gz
            rm sectional-tiles.tar.gz
            echo "Tiles extracted:"
            du -sh sectional-tiles/
          else
            echo "No sectional tiles release found, skipping"
          fi

      - name: Prepare site files
        run: |
          mkdir -p _site
          
          # Copy web assets
          cp index.html _site/
          cp wpa_logo.png _site/
          
          # Copy data files
          cp data/wa_pilots.json _site/wa_pilots_full.json
          cp data/wa_zip_geo_simple.json _site/
          cp data/wpa_chapters.json _site/
          
          # Copy sectional tiles if they exist
          if [[ -d "sectional-tiles" ]]; then
            cp -r sectional-tiles _site/
            echo "Sectional tiles included"
          else
            echo "No sectional tiles to copy"
          fi
          
          echo "Site contents:"
          du -sh _site/
          find _site -maxdepth 2 -type d

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
